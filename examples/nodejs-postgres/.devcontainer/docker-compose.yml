services:
  app:
    image: mcr.microsoft.com/devcontainers/base:debian
    volumes:
      - ..:/workspace:cached
    command: sleep infinity

  postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # No host ports here — VS Code users access postgresql:5432 directly inside network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No host ports here — VS Code users access redis:6379 directly inside network

volumes:
  postgres-data:
